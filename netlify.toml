[build]
  command   = "node scripts/build-seo-snapshot.mjs && node scripts/generate-sitemap.mjs && vite build && node scripts/prerender-routes.mjs"
  publish   = "dist"

# Proxy JioSaavn API requests server-side (avoids CORS in production)
[[redirects]]
  from   = "/api/saavn/*"
  to     = "https://jiosaavn-api-v4.vercel.app/api/:splat"
  status = 200
  force  = true

# Redirect old Vercel preview URLs to the canonical domain
[[redirects]]
  from   = "https://universo-music.vercel.app/*"
  to     = "https://univerzo.in/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://univerzo-music.vercel.app/*"
  to     = "https://univerzo.in/:splat"
  status = 301
  force  = true

# SPA catch-all — let React Router handle all client-side routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"
