<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    
    <!-- Primary Meta Tags -->
    <title>Univerzo Music | Free Music Streaming Without Sign-in</title>
    <meta name="description" content="Stream trending songs, genre mixes, and artist discoveries on Univerzo Music. Listen instantly in your browser without a sign-in wall." />
    <meta name="keywords" content="free music streaming, online music player, music discovery, play music online, listen to songs, music catalog, digital music, Bollywood songs, Hindi music, Punjabi music" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="language" content="English" />
    <meta name="author" content="Univerzo Music" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://universo-music.vercel.app/" />
    <meta property="og:title" content="Univerzo Music | Free Music Streaming Without Sign-in" />
    <meta property="og:description" content="Stream trending songs, genre mixes, and artist discoveries on Univerzo Music." />
    <meta property="og:image" content="https://universo-music.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Univerzo Music" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Univerzo Music | Free Music Streaming Without Sign-in" />
    <meta name="twitter:description" content="Stream trending songs, genre mixes, and artist discoveries on Univerzo Music." />
    <meta name="twitter:image" content="https://universo-music.vercel.app/og-image.png" />
    <meta name="twitter:site" content="@univerzomusic" />
    <meta name="twitter:creator" content="@univerzomusic" />

    <!-- Canonical URL for SEO -->
    <link rel="canonical" href="https://universo-music.vercel.app/" />

    <!-- Performance & Preloading Hints -->
    <link rel="dns-prefetch" href="https://api.jiosaavn.com" />
    <link rel="dns-prefetch" href="https://cdn.jiosaavn.com" />
    <link rel="preconnect" href="https://api.jiosaavn.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jiosaavn.com" crossorigin />
    
    <!-- Prefetch for faster page loads -->
    <link rel="prefetch" href="/sitemap.xml" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Univerzo Music",
      "url": "https://universo-music.vercel.app/",
      "logo": "https://universo-music.vercel.app/og-image.png",
      "description": "Free music discovery and streaming platform - discover, search, and listen to songs from artists worldwide",
      "sameAs": [
        "https://twitter.com/univerzomusic"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "url": "https://universo-music.vercel.app"
      }
    }
    </script>

    <!-- Structured Data - Website Search Action -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Univerzo Music",
      "url": "https://universo-music.vercel.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://universo-music.vercel.app/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data - FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Univerzo Music?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Univerzo Music is a free music discovery and streaming platform that lets you explore songs, albums, and artists from multiple music catalogs including JioSaavn."
          }
        },
        {
          "@type": "Question",
          "name": "How do I search for music?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Use the search feature on the home page to find artists, songs, albums, or playlists. Results are fetched from multiple music providers in real-time."
          }
        },
        {
          "@type": "Question",
          "name": "Is Univerzo Music free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Univerzo Music is completely free to use. You can search, discover, and explore unlimited music without any subscription."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
